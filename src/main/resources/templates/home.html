<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Blog</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container">
        <h1>Latest Posts</h1>

        <div th:if="${articles.isEmpty()}">
            <p class="empty-state">No articles yet. Check back soon!</p>
        </div>

        <div th:each="article : ${articles}" class="article-card">
            <h2>
                <a th:href="@{/posts/{slug}(slug=${article.slug})}" th:text="${article.title}">Article Title</a>
            </h2>
            <time th:text="${article.publishedAt}" class="date">2026-01-01</time>
            <p class="excerpt" th:text="${#strings.abbreviate(article.content, 200)}">Excerpt...</p>
            <a th:href="@{/posts/{slug}(slug=${article.slug})}" class="read-more">Read more →</a>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
