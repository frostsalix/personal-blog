<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article.title}">Article Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container article-detail">
        <h1 th:text="${article.title}">Article Title</h1>
        <time th:text="${article.publishedAt}" class="date">2026-01-01</time>
        <div class="content" th:utext="${article.content}">
            Article content here.
        </div>
        <a th:href="@{/}" class="back-link">← Back to Home</a>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
